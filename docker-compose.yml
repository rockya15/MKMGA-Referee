version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server/uploads:/app/uploads
    environment:
      - NODE_ENV=production

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

  sidecar:
    build: ./sidecar
    depends_on:
      - server
    environment:
      - SERVER_URL=http://server:3000